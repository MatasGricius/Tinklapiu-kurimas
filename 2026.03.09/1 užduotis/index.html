<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/5c73cb6ff5.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="caprasimo-regular">
    <div class="card">
      <div class="header">
        <img src="IMG/avatar.png" alt="Avatar" width="200px" class="avatar" />
      </div>
      <div class="content">
        <h1>About Me</h1>
        <p>
          I'm passionate about creating interactive websites, exploring new

        </p>
        <div class="facebook">
          <img src="IMG/facebook.png" alt="facebook" width="25px" />

          <img src="IMG/instagram.png" alt="instagram" width="25px" />

          <li><i class="fa-regular fa-heart"></i>&nbsp;Web Design</li>

          <li><i class="fa-solid fa-bolt"></i>&nbsp;UI/UX</li>
        </ul>
        <div class="buttons">
          <button class="subscribe">Subscribe</button>
          <button class="contact">Contact</button>
        </div>
        <section>
          <ul>
            <li><i class="fa-regular fa-heart"></i>60,4 k</li>
            <li><i class="fa-regular fa-comment"></i>20 k</li>
            <li><i class="fa-regular fa-eye"></i>12,4 k</li>
          </ul>
