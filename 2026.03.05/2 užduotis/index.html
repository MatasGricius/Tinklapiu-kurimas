<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <form action="#" method="get"></form>
      <h1>Užpildykite formą:</h1>
      <p><b>Visi laukai privalomi.</b></p>
      <p>Vardas iš didžiosios raidės:</p>
      <input type="text" name="" id="" placeholder="Vardas" />
      <p>Jūsų telefono numeris:</p>
      <input type="text" name="" id="" placeholder="+370-xxx-xxxx" />
      <p>El. pašto adresas:</p>
      <input type="text" name="" id="" placeholder="el.p.adresas" />
      <p>Jūsų mėgstamiausios internetinės svetainės adresas:</p>
      <input type="text" name="" id="" placeholder="url adresas" />
      <p>Jūsų gimimo data:</p>
      <input type="date" name="" id="" /><br /><br />
      <label for="number">Jūsų amžius (18-65):</label><br /><br />
      <input
        type="number"
        name="age"
        id="number"
        min="18"
        max="65"
        placeholder="nuo 18 ik 65 metų"
      />
      <p>Jūsų pašto kodas:</p>
      <input type="text" name="" id="" placeholder="XX-01234">
      <p>Jūsų mėgstamiausia spalva:</p>
      <input type="color" name="" id=""><br>
      <button>Pateikti</button>
    </div>
  </body>
</html>
