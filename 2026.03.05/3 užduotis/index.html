<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form action="#" method="get"></form>
        <h1>Form Exercise</h1>
        <label for="text">Text input</label><br>
        <input type="text" name="" id="text" placeholder="Enter text..." /><br>

        <label for="pasword">Password input</label><br>
        <input type="password" name="" id="password"><br>

        <label for="email">E-mail input</label><br>
        <input type="text" name="" id="email"/><br>

        <label for="url">URL input</label><br>
        <input type="text" name="" id="url"/><br>

        <label for="search">Search input</label><br>
        <input type="text" name="" id="search"/><br>

        <label for="required">Required input</label><br>
        <input type="text" name="" id="required"/><br>

        <label for="read">Read-only input</label><br>
        <input type="text" name="" id="read" placeholder="Readonly text"/><br>

        <label for="disabled">Disabled input</label><br>
        <input type="text" name="" id="disabled" disabled/><br>

        <label for="single">Single-select</label><br>
        <select name="" id="single">
            <option value="">Option 1</option>
        </select><br>

        <label for="multiple">Multiple-select</label><br>
        <select name="" id="multiple">
            <option value="">Option 1</option>
            <option value="">Option 2</option>
            <option value="">Option 3</option>
        </select><br>

        <label for="checkbox">Checkbox</label><br>
        <label> <input type="checkbox" name="" id="checkbox">Option A</label><br>
        <label> <input type="checkbox" name="" id="checkbox">Option B</label><br>
        <label> <input type="checkbox" name="" id="checkbox">Option C</label><br>

        <label for="radio">Radio buttons</label><br>
        <label> <input type="radio" name="" id="radio">Option A</label><br>
        <label> <input type="radio" name="" id="radio">Option B</label><br>
        <label> <input type="radio" name="" id="radio">Option C</label><br>

        <label for="button">File input</label><br>
        <label> <button>Choose File</button>No file chosen</label><br>

        <label for="textarea">Textarea</label><br>
        <textarea name="" id="textarea"></textarea><br>

        <label for="date">Date</label><br>
        <input type="date" name="" id="date"><br>

        <label for="number">Number input</label><br>
        <input type="number" name="" id="number"><br>

        <label for="range">Range input</label><br>
        <input type="range" name="" id="range"><br>

        <button type="submit">Save</button>
        <button type="reset">Cancel</button>
    </div>
</body>
</html>
