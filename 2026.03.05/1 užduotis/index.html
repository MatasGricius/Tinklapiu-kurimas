<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <form action="#" method="get">
        <p>Title</p>
        <label for="Vyras">Mr</label>
        <input type="radio" name="lytis" value="Mr" id="Vyras" />
        <label for="Moteris">Mrs</label>
        <input type="radio" name="lytis" value="Mrs" id="Moteris" />
        <label for="panele">Miss</label>
        <input type="radio" name="lytis" value="Miss" id="Panele" />
        <p>
          <label for="vardas">First Name</label><br />
          <input type="text" id="vardas" name="name" />
        </p>
        <p>
          <label for="pavarde">Last Name</label><br />
          <input type="text" id="pavarde" name="lastname" />
        </p>
        <p>
          <label for="elpastas">Email</label><br />
          <input type="text" id="elpastas" name="email" />
        </p>
        <p>
          <label for="telnumeris">Phone number</label><br />
          <input type="text" id="telnumeris" name="phonenumber" />
        </p>
        <p>
          <label for="slaptazodis">Password</label><br />
          <input type="text" id="slaptazodis" name="password" />
        </p>
        <p>
          <label for="šalis">Country</label><br />
          <select name="" id="šalis">
            <option value="China">China</option>
            <option value="Lithuania">Lithuania</option>
            <option value="USA">USA</option>
          </select>
        </p>
        <p>
          <input type="checkbox" name="checkbox" value="agree" id="sutikimas" />
          <label for="sutikimas"
            >I agree to the <a href="">terms and conditions</a></label
          >
        </p>
        <button>Sign up</button>
        <button type="reset">Reset form</button>
      </form>
    </div>
  </body>
</html>
