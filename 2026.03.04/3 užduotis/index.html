<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table,
      td,
      th {
        border: 1px solid grey;
        border-collapse: collapse;
        font-family: Arial, Helvetica, sans-serif;
        padding: 5px;
      }
      
    </style>
  </head>
  <body>
    <div style="text-align: left;">
      <table style="width: 420px">
        <caption style="margin-bottom: 10px; font-size: x-large">
          Mokinių tvarkaraščio pavyzdys
        </caption>
        <tr>
          <th>Diena</th>
          <th>Dalykas</th>
          <th>Klasė</th>
          <th>Pastaba</th>
        </tr>
        <tr>
          <td rowspan="2" style="background-color: rgb(95, 231, 255); text-align: center; vertical-align: top;">Pirmadienis</td>
          <td style="background-color: rgb(124, 255, 124);">Matematika</td>
          <td rowspan="2" style="background-color: pink; text-align: left; vertical-align: top;">5A</td>
          <td style="background-color: rgb(253, 255, 149);">Kontrolinis</td>
        </tr>
        <tr>
          <td style="background-color: rgb(211, 137, 0);">Lietuvių kalba</td>
          <td style="background-color: grey;">Namų darbai</td>
        </tr>
        <tr>
          <td style="background-color: rgb(218, 63, 63);">Antradienis</td>
          <td colspan="2" style="background-color: rgb(11, 128, 102);">Kūno kultūra (jungtinė pamoka)</td>
          <td style="background-color: pink;">Sporto salė</td>
        </tr>
      </table>
    </div>
  </body>
</html>
